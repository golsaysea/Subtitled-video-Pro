name: Release Python Package

on:
  push:
    tags:
      - 'v*'

# 添加下面这两行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
