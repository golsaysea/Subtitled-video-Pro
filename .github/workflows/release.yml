name: Release Python Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # 必须：用于签名[cite: 5]
      contents: write      # 必须：用于上传[cite: 5]
      attestations: write   # 必须：用于写入证明[cite: 5]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Package
        run: |
          pip install build
          python -m build  # 它会自动在根目录寻找 pyproject.toml    

      - name: Build
        run: |
          pip install build
          # 显式创建 dist 目录，防止工具链环境问题
          mkdir -p dist
          python -m build

      - name: Attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 明确指定上传 dist 目录下的所有文件[cite: 4, 5]
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
