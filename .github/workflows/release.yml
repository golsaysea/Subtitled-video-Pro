name: Release Python Package

on:
  push:
    tags:
      - 'v*'  # 当你发布 v1.0.2 等标签时触发

# 强制使用最新的 Node.js 环境以消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 必须配置以下权限，否则“构建证明”无法写入
    permissions:
      id-token: write      # 用于身份认证
      contents: write      # 用于创建 Release 和上传文件
      attestations: write   # 用于生成构建证明

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        run: pip install build

      - name: Build Package
        # 这一步会生成 .whl 和 .tar.gz 文件到 dist 文件夹
        run: python -m build

      - name: Check Built Files
        # 调试用：在日志中列出生成的文件，确保不是空的
        run: ls -R dist/

      - name: Generate Attestations
        # 核心步骤：为 dist 目录下的所有构件生成证明
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Create GitHub Release
        # 将构建好的包上传到 Release 页面
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
